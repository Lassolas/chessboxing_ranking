<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Chessboxing Skill Evaluator</title>
<style>
:root {
  --bg-deep:        #0a0a0f;
  --bg-panel:       #12121a;
  --bg-panel-alt:   #1a1a26;
  --border:         #2a2a3a;
  --gold-bright:    #f5c842;
  --gold-mid:       #c9922a;
  --gold-dim:       #7a5a18;
  --gold-glow:      rgba(245,200,66,0.18);
  --text-primary:   #f0ead8;
  --text-secondary: #9090a8;
  --text-muted:     #55556a;
  --win-green:      #39d353;
  --lose-red:       #e03c3c;
  --even-blue:      #4a9eff;
  --font-display:   Georgia, 'Times New Roman', serif;
  --font-body:      system-ui, -apple-system, sans-serif;
  --font-mono:      ui-monospace, Menlo, Consolas, monospace;
  --radius-card:    12px;
  --item-h:         52px;
}

*, *::before, *::after { box-sizing: border-box; }
html, body { -webkit-text-size-adjust: 100%; margin: 0; padding: 0; }

body {
  font-family: var(--font-body);
  background-color: var(--bg-deep);
  background-image: url('assets/bg-tile.png');
  background-repeat: repeat;
  color: var(--text-primary);
  min-height: 100vh;
}

/* ── HEADER ── */
#site-header {
  text-align: center;
  padding: 36px 20px 24px;
  background-image: url('assets/hero-banner.png');
  background-size: cover;
  background-position: center 40%;
  position: relative;
  border-bottom: 1px solid var(--gold-dim);
}
#site-header::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, rgba(10,10,15,0.52) 0%, rgba(10,10,15,0.76) 100%);
  pointer-events: none;
}
#site-header > * { position: relative; z-index: 1; }

.site-title {
  font-family: var(--font-display);
  font-size: clamp(24px, 7vw, 50px);
  font-weight: 700;
  letter-spacing: 0.14em;
  color: var(--gold-bright);
  text-shadow: 0 0 32px rgba(245,200,66,0.45), 0 2px 0 rgba(0,0,0,0.9);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 14px;
}
.site-title img {
  width: clamp(26px, 5vw, 42px);
  height: clamp(26px, 5vw, 42px);
  object-fit: contain;
  filter: drop-shadow(0 0 6px rgba(245,200,66,0.5));
}
.site-tagline {
  color: var(--text-secondary);
  font-size: 12px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin: 8px 0 0;
}

/* ── MAIN LAYOUT ── */
#main { max-width: 1100px; margin: 0 auto; padding-bottom: 80px; }

/* ── SECTION HEADING ── */
.section-title {
  font-family: var(--font-display);
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--gold-bright);
  border-bottom: 1px solid var(--gold-dim);
  padding: 18px 16px 9px;
  margin: 0;
}
.section-hint {
  font-size: 11px;
  color: var(--text-muted);
  font-family: var(--font-body);
  font-weight: 400;
  text-transform: none;
  letter-spacing: 0;
  margin-left: 8px;
}

/* ── DRUMS ROW ── */
.drums-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  border-bottom: 1px solid var(--border);
}

.drum-section {
  padding: 10px 0 0;
}
.drum-section:first-child { border-right: 1px solid var(--border); }

.drum-label {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-secondary);
  padding: 0 12px 6px;
}
.drum-label img { width: 14px; height: 14px; object-fit: contain; opacity: 0.75; }

/* The clip wrapper hides overflow and provides gradient masks */
.drum-clip {
  position: relative;
  height: calc(var(--item-h) * 3); /* show 3 items */
  overflow: hidden;
}

/* Center-slot highlight */
.drum-clip::before {
  content: '';
  position: absolute;
  left: 6px; right: 6px;
  top: var(--item-h); /* one item down = center slot */
  height: var(--item-h);
  background: rgba(245, 200, 66, 0.07);
  border-top: 1px solid rgba(245, 200, 66, 0.22);
  border-bottom: 1px solid rgba(245, 200, 66, 0.22);
  border-radius: 6px;
  pointer-events: none;
  z-index: 2;
}

/* Top/bottom fade */
.drum-clip::after {
  content: '';
  position: absolute;
  inset: 0;
  background:
    linear-gradient(to bottom, var(--bg-deep) 0%, transparent 28%),
    linear-gradient(to top,    var(--bg-deep) 0%, transparent 28%);
  pointer-events: none;
  z-index: 3;
}

.drum {
  height: 100%;
  overflow-y: scroll;
  scroll-snap-type: y mandatory;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  cursor: ns-resize;
  overscroll-behavior: contain;
}
.drum::-webkit-scrollbar { display: none; }

.drum-spacer { height: var(--item-h); flex-shrink: 0; }

.drum-item {
  height: var(--item-h);
  scroll-snap-align: center;
  scroll-snap-stop: always;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
  padding: 0 8px;
  cursor: pointer;
  opacity: 0.35;
  transition: opacity 0.15s;
  user-select: none;
  -webkit-user-select: none;
  text-align: center;
}
.drum-item.active { opacity: 1; }

.drum-item__name {
  font-size: 12px;
  font-weight: 700;
  color: var(--text-primary);
  line-height: 1.2;
}
.drum-item.active .drum-item__name { color: var(--gold-bright); }

.drum-item__sub {
  font-size: 10px;
  color: var(--text-secondary);
  line-height: 1.2;
}
.drum-item.active .drum-item__sub { color: var(--gold-mid); }

/* ── FIGHTER CARD ── */
.fighter-card {
  display: grid;
  grid-template-columns: 1fr auto;
  align-items: center;
  gap: 10px 14px;
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-panel);
}
@keyframes pulse-gold {
  0%   { box-shadow: inset 0 0 0 0 rgba(245,200,66,0); }
  40%  { box-shadow: inset 0 0 0 2px rgba(245,200,66,0.45); }
  100% { box-shadow: inset 0 0 0 0 rgba(245,200,66,0); }
}
.fighter-card.pulse { animation: pulse-gold 0.5s ease; }

.fighter-card__label {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--gold-dim);
  margin-bottom: 3px;
}
.fighter-card__chess {
  font-size: 14px;
  font-weight: 700;
  color: var(--text-primary);
  line-height: 1.2;
}
.fighter-card__chess-sub {
  font-size: 11px;
  color: var(--gold-mid);
  font-family: var(--font-mono);
  margin-top: 1px;
}
.fighter-card__box {
  font-size: 12px;
  color: var(--text-secondary);
  margin-top: 3px;
}

.fighter-card__right { text-align: right; }
.fighter-card__rank {
  font-size: 11px;
  color: var(--text-secondary);
  margin-top: 4px;
  font-family: var(--font-mono);
}

/* ── FIGHT CARD ── */
#fight-card {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: var(--bg-panel);
  border-top: 2px solid var(--gold-mid);
  border-radius: 16px 16px 0 0;
  padding: 0 0 env(safe-area-inset-bottom, 12px);
  z-index: 200;
  transform: translateY(100%);
  transition: transform 0.3s cubic-bezier(0.32,0.72,0,1);
  box-shadow: 0 -8px 48px rgba(0,0,0,0.7);
  max-height: 75vh;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
#fight-card.visible { transform: translateY(0); }

.fc-handle {
  width: 32px; height: 4px;
  background: var(--border);
  border-radius: 2px;
  margin: 10px auto 0;
}
.fc-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 16px 0;
}
.fc-title {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--gold-dim);
}
.fc-close {
  background: none;
  border: none;
  color: var(--text-muted);
  font-size: 16px;
  cursor: pointer;
  padding: 4px 8px;
  line-height: 1;
  border-radius: 4px;
}
.fc-close:hover { color: var(--text-primary); }

.fc-fighters {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  gap: 8px;
  padding: 12px 16px 8px;
}

.fc-fighter { display: flex; flex-direction: column; gap: 2px; }
.fc-fighter--a  { text-align: left; }
.fc-fighter--opp { text-align: right; }

.fc-corner {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 2px;
}
.fc-fighter--a .fc-corner { color: var(--gold-dim); }

.fc-chess-level { font-size: 13px; font-weight: 700; color: var(--text-primary); line-height: 1.2; }
.fc-chess-elo   { font-size: 11px; color: var(--gold-mid); font-family: var(--font-mono); }
.fc-box-level   { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
.fc-stars-row   { margin-top: 4px; }

.fc-outcome {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  width: 68px; height: 68px;
  border-radius: 50%;
  background: var(--bg-panel-alt);
  border: 2px solid var(--gold-mid);
  transition: border-color 0.3s;
  flex-shrink: 0;
}
.fc-outcome__prob {
  font-size: 16px;
  font-weight: 700;
  font-family: var(--font-mono);
  color: var(--gold-bright);
  line-height: 1;
  transition: color 0.3s;
}
.fc-outcome__label {
  font-size: 8px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-secondary);
  margin-top: 3px;
}

.fc-divider {
  width: calc(100% - 32px);
  height: 28px;
  display: block;
  margin: 0 auto;
  object-fit: contain;
  opacity: 0.5;
}

.fc-bars {
  padding: 0 16px 16px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.fc-bar-row {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 11px;
  color: var(--text-secondary);
}
.fc-bar-row > span:not(.fc-diff) { flex: 0 0 52px; text-align: right; }
.fc-diff {
  flex: 0 0 68px;
  font-size: 10px;
  font-family: var(--font-mono);
  text-align: right;
  white-space: nowrap;
}
.fc-bar {
  flex: 1;
  height: 5px;
  background: var(--bg-panel-alt);
  border-radius: 3px;
  overflow: hidden;
  position: relative;
}
.fc-bar__fill {
  position: absolute;
  left: 0; top: 0; bottom: 0;
  border-radius: 3px;
  background: var(--gold-bright);
  transition: width 0.4s ease;
}

/* ── GRID ── */
#explore-section { padding-bottom: 16px; }

#grid-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 12px 12px 0;
  gap: 10px;
}

#grid-container { position: relative; max-width: 100%; }

canvas#grid {
  display: block;
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: 6px;
  max-width: 100%;
  height: auto;
  touch-action: none;
  user-select: none;
  -webkit-user-select: none;
  cursor: crosshair;
}

#tooltip {
  position: absolute;
  pointer-events: none;
  background: rgba(12,12,20,0.96);
  color: var(--text-primary);
  padding: 6px 10px;
  border-radius: 6px;
  border: 1px solid var(--border);
  font: 12px/1.35 var(--font-mono);
  white-space: nowrap;
  transform: translate(-50%, calc(-100% - 14px));
  display: none;
  z-index: 10;
  box-shadow: 0 4px 16px rgba(0,0,0,0.5);
  max-width: 90vw;
}
#tooltip .tt-stars { display: block; margin-top: 4px; }

.legend-row {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 12px;
  color: var(--text-secondary);
  width: 100%;
  max-width: 540px;
  padding: 0 4px;
}
.legend-row canvas { flex: 1; border-radius: 3px; border: 1px solid var(--border); }

.legend-markers {
  display: flex;
  flex-wrap: wrap;
  gap: 12px 20px;
  font-size: 11px;
  color: var(--text-secondary);
  padding: 0 4px;
  width: 100%;
  max-width: 540px;
}
.swatch {
  display: inline-block;
  width: 12px; height: 12px;
  border-radius: 2px;
  vertical-align: middle;
  margin-right: 4px;
}
.you-mark { background: #f5c842; }
.iso-line {
  display: inline-block;
  width: 20px; height: 4px;
  background: rgba(245,200,66,0.96);
  vertical-align: middle;
  margin-right: 4px;
  border-radius: 2px;
}
.iso-band {
  display: inline-block;
  width: 20px; height: 3px;
  vertical-align: middle;
  margin-right: 4px;
  border-radius: 2px;
  background: rgba(255,255,255,0.82);
}
.iso-band--balanced {
  height: 2px;
  background: rgba(255,255,255,0.68);
}
.iso-band--outer {
  height: 1px;
  background: rgba(255,255,255,0.5);
}

/* ── DESKTOP ── */
@media (min-width: 760px) {
  #main {
    display: grid;
    grid-template-columns: 300px 1fr;
    align-items: start;
    padding-bottom: 40px;
  }
  .section-title { padding: 18px 16px 9px; }

  #fighter-setup {
    grid-column: 1;
    grid-row: 1;
    border-right: 1px solid var(--border);
    position: sticky;
    top: 0;
    max-height: 100vh;
    overflow-y: auto;
  }
  #explore-section { grid-column: 2; }

  /* fight card: inline in sidebar on desktop */
  #fight-card {
    position: static;
    transform: none !important;
    border-radius: 10px;
    border: 1px solid var(--gold-mid);
    border-top: 1px solid var(--gold-mid);
    box-shadow: none;
    max-height: none;
    margin: 10px 12px 12px;
    padding-bottom: 0;
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.2s, visibility 0.2s;
  }
  #fight-card.visible { opacity: 1; visibility: visible; }
  .fc-handle { display: none; }
}

@media (max-width: 380px) {
  .drum-item__name { font-size: 11px; }
  .drum-item__sub  { font-size: 9px; }
}
</style>
</head>
<body>

<header id="site-header">
  <div class="site-title">
    <img src="assets/icon-chess.png" alt="">
    CHESSBOXING
    <img src="assets/icon-boxing.png" alt="">
  </div>
  <p class="site-tagline">Where do you stand in the ring?</p>
</header>

<div id="main">

  <!-- ── FIGHTER SETUP ── -->
  <section id="fighter-setup">
    <h2 class="section-title">Your Profile</h2>

    <div class="drums-row">
      <!-- Chess drum -->
      <div class="drum-section">
        <div class="drum-label">
          <img src="assets/icon-chess.png" alt="">Chess
        </div>
        <div class="drum-clip">
          <div class="drum" id="chess-drum" role="listbox" aria-label="Chess level" tabindex="0"></div>
        </div>
      </div>
      <!-- Boxing drum -->
      <div class="drum-section">
        <div class="drum-label">
          <img src="assets/icon-boxing.png" alt="">Boxing
        </div>
        <div class="drum-clip">
          <div class="drum" id="boxing-drum" role="listbox" aria-label="Boxing level" tabindex="0"></div>
        </div>
      </div>
    </div>

    <!-- Fighter summary card -->
    <div class="fighter-card" id="my-fighter-card">
      <div>
        <div class="fighter-card__label">Your Corner</div>
        <div class="fighter-card__chess" id="myChessLabel">—</div>
        <div class="fighter-card__chess-sub" id="myElo">—</div>
        <div class="fighter-card__box" id="myBoxLabel">—</div>
      </div>
      <div class="fighter-card__right">
        <svg class="stars-svg" id="myStars" width="110" height="22" viewBox="0 0 500 100"></svg>
        <div class="fighter-card__rank" id="myRating">—</div>
      </div>
    </div>

    <!-- Fight card: fixed bottom sheet on mobile, inline here on desktop -->
    <div id="fight-card">
      <div class="fc-handle"></div>
      <div class="fc-header">
        <span class="fc-title">Fight Card</span>
        <button class="fc-close" id="fc-close-btn" aria-label="Close">✕</button>
      </div>
      <div class="fc-fighters">
        <div class="fc-fighter fc-fighter--a">
          <div class="fc-corner">Your Corner</div>
          <div class="fc-chess-level" id="fc-my-chess">—</div>
          <div class="fc-chess-elo"   id="fc-my-elo">—</div>
          <div class="fc-box-level"   id="fc-my-box">—</div>
        </div>
        <div class="fc-outcome" id="fc-outcome">
          <div class="fc-outcome__prob"  id="hP">—</div>
          <div class="fc-outcome__label" id="fc-outcome-label">vs</div>
        </div>
        <div class="fc-fighter fc-fighter--opp">
          <div class="fc-corner">Opponent</div>
          <div class="fc-chess-level" id="hChess">—</div>
          <div class="fc-chess-elo"   id="hElo">—</div>
          <div class="fc-box-level"   id="hBox">—</div>
          <div class="fc-stars-row">
            <svg class="stars-svg" id="oppStars" width="95" height="19" viewBox="0 0 500 100"></svg>
          </div>
        </div>
      </div>
      <img src="assets/divider.png" class="fc-divider" alt="">
      <div class="fc-bars">
        <div class="fc-bar-row">
          <span>Chess</span>
          <div class="fc-bar"><div class="fc-bar__fill" id="fc-chess-bar" style="width:50%"></div></div>
          <span class="fc-diff" id="fc-chess-diff">—</span>
        </div>
        <div class="fc-bar-row">
          <span>Boxing</span>
          <div class="fc-bar"><div class="fc-bar__fill" id="fc-box-bar" style="width:50%"></div></div>
          <span class="fc-diff" id="fc-box-diff">—</span>
        </div>
      </div>
    </div>
  </section>

  <!-- ── EXPLORE GRID ── -->
  <section id="explore-section">
    <h2 class="section-title">Explore Matchups <span class="section-hint">tap a cell to see that fight</span></h2>
    <div id="grid-wrap">
      <div id="grid-container">
        <canvas id="grid"></canvas>
        <div id="tooltip"></div>
      </div>
      <div class="legend-row">
        <span>0%</span>
        <canvas id="legendBar" width="220" height="10"></canvas>
        <span>100%</span>
      </div>
      <div class="legend-markers">
        <span><span class="swatch you-mark"></span>You</span>
        <span><span class="iso-line"></span>50 % (even)</span>
        <span><span class="iso-band iso-band--balanced"></span>45–55 %</span>
        <span><span class="iso-band"></span>25/75 %</span>
        <span><span class="iso-band iso-band--outer"></span>10/90 %</span>
      </div>
    </div>
  </section>

</div><!-- #main -->

<script>
// ── CONFIG ──
const CHESS_MIN = 0, CHESS_MAX = 7, CHESS_STEP = 0.2;
const BOX_MIN   = 0, BOX_MAX   = 5, BOX_STEP   = 0.2;
const CELL   = 14;
const ITEM_H = 52; // must match CSS --item-h

const MARGIN = { top: 40, right: 24, bottom: 68, left: 88 };

const CHESS_NAMED = [
  { value: 0, short: 'Total Beginner', sub: '800 ELO'  },
  { value: 1, short: 'Beginner',       sub: '1028 ELO' },
  { value: 2, short: 'Casual Player',  sub: '1257 ELO' },
  { value: 3, short: 'Club Player',    sub: '1485 ELO' },
  { value: 4, short: 'Strong Club',    sub: '1714 ELO' },
  { value: 5, short: 'Expert',         sub: '1942 ELO' },
  { value: 6, short: 'Master',         sub: '2171 ELO' },
  { value: 7, short: 'Elite / GM',     sub: '2400 ELO' },
];
const BOXING_NAMED = [
  { value: 0, short: 'Novice',        sub: 'Never sparred'       },
  { value: 1, short: 'Beginner',      sub: 'Gym < 1 year'        },
  { value: 2, short: 'Amateur',       sub: '1–3 yrs training'    },
  { value: 3, short: 'Regional',      sub: 'First amateur bouts' },
  { value: 4, short: 'Semi-Pro',      sub: '10+ fights'          },
  { value: 5, short: 'Professional',  sub: '40+ fights or pro'   },
];

// Drum-picker levels at 0.2-step granularity (intermediate items show ELO / level number)
const _eloOf = c => Math.round(800 + c * (1600 / 7));
function chessCategory(v) {
  for (let i = CHESS_NAMED.length - 1; i >= 0; i--) {
    if (v >= CHESS_NAMED[i].value) return CHESS_NAMED[i];
  }
  return CHESS_NAMED[0];
}
const CHESS_DRUM_LEVELS = [];
for (let k = 0; k <= Math.round((CHESS_MAX - CHESS_MIN) / CHESS_STEP); k++) {
  const v = +(CHESS_MIN + k * CHESS_STEP).toFixed(1);
  const named = CHESS_NAMED.find(n => n.value === v);
  const category = chessCategory(v);
  CHESS_DRUM_LEVELS.push({
    value: v,
    short: named ? named.short : category.short,
    sub: named ? named.sub : (_eloOf(v) + ' ELO'),
  });
}
const BOXING_DRUM_LEVELS = [];
for (let k = 0; k <= Math.round((BOX_MAX - BOX_MIN) / BOX_STEP); k++) {
  const v = +(BOX_MIN + k * BOX_STEP).toFixed(1);
  const named = BOXING_NAMED.find(n => n.value === v);
  BOXING_DRUM_LEVELS.push({ value: v, short: named ? named.short : v.toFixed(1), sub: named ? named.sub : '' });
}

function boxLabel(v) {
  const named = BOXING_NAMED.find(n => n.value === v);
  return named ? named.short + ' · ' + named.sub : closestNamed(BOXING_NAMED, v).short + ' · Lv ' + v.toFixed(1);
}

function buildLevels(min, max, step) {
  const out = [];
  const n = Math.round((max - min) / step) + 1;
  for (let k = 0; k < n; k++) out.push(+(min + k * step).toFixed(2));
  return out;
}
const chessLevels = buildLevels(CHESS_MIN, CHESS_MAX, CHESS_STEP);
const boxLevels   = buildLevels(BOX_MIN,   BOX_MAX,   BOX_STEP);
const NX = chessLevels.length;
const NY = boxLevels.length;

// ── CANVAS ──
const canvas = document.getElementById('grid');
canvas.width  = MARGIN.left + NX * CELL + MARGIN.right;
canvas.height = MARGIN.top  + NY * CELL + MARGIN.bottom;
const ctx = canvas.getContext('2d');

// ── MODEL ──
const sigmoid = x => 1 / (1 + Math.exp(-x));
function pWin(myC, myB, oppC, oppB) {
  return sigmoid(2 * Math.tanh((myC - oppC) / 3) + (myB - oppB));
}
const eloOf = c => Math.round(800 + c * (1600 / 7));

// ── COLOR SCALE: deep purple → electric blue → gold ──
function color(p) {
  const cLow  = [26,  10,  46];
  const cMid  = [42,  92, 138];
  const cHigh = [245, 200,  66];
  let a, b, t;
  if (p < 0.5) { a = cLow; b = cMid;  t = p / 0.5; }
  else         { a = cMid; b = cHigh; t = (p - 0.5) / 0.5; }
  return `rgb(${Math.round(a[0]+(b[0]-a[0])*t)},${Math.round(a[1]+(b[1]-a[1])*t)},${Math.round(a[2]+(b[2]-a[2])*t)})`;
}

// ── COORD HELPERS ──
function cell2px(i, j) {
  return { x: MARGIN.left + i * CELL, y: MARGIN.top + (NY - 1 - j) * CELL };
}
function px2cell(px, py) {
  const i = Math.floor((px - MARGIN.left) / CELL);
  const j = NY - 1 - Math.floor((py - MARGIN.top) / CELL);
  if (i < 0 || i >= NX || j < 0 || j >= NY) return null;
  return { i, j };
}

// ── RATINGS ──
const avgP = new Float32Array(NX * NY);
for (let j = 0; j < NY; j++) {
  for (let i = 0; i < NX; i++) {
    const c1 = chessLevels[i], b1 = boxLevels[j];
    let sum = 0;
    for (let j2 = 0; j2 < NY; j2++) for (let i2 = 0; i2 < NX; i2++) sum += pWin(c1, b1, chessLevels[i2], boxLevels[j2]);
    avgP[j * NX + i] = sum / (NX * NY);
  }
}
let minAvg = Infinity, maxAvg = -Infinity;
for (let k = 0; k < avgP.length; k++) {
  if (avgP[k] < minAvg) minAvg = avgP[k];
  if (avgP[k] > maxAvg) maxAvg = avgP[k];
}
function rankOf(i, j)  { return (avgP[j * NX + i] - minAvg) / (maxAvg - minAvg); }
function starsOf(i, j) { return rankOf(i, j) * 5; }

// ── STARS SVG ──
const STAR_PATH = "M50 6 L62 38 L96 40 L70 60 L80 92 L50 74 L20 92 L30 60 L4 40 L38 38 Z";
function buildStarSvg(svgEl) {
  const id = 'cp_' + Math.random().toString(36).slice(2, 9);
  let bg = '', fg = '';
  for (let k = 0; k < 5; k++) {
    bg += `<g transform="translate(${k*100},0)"><path d="${STAR_PATH}" fill="#2a2a1a" stroke="#5a4a18" stroke-width="2"/></g>`;
    fg += `<g transform="translate(${k*100},0)"><path d="${STAR_PATH}" fill="#f5b800" stroke="#c98e0a" stroke-width="2"/></g>`;
  }
  svgEl.innerHTML = `<defs><clipPath id="${id}"><rect x="0" y="0" width="0" height="100"/></clipPath></defs>
    <g>${bg}</g><g clip-path="url(#${id})">${fg}</g>`;
  return svgEl.querySelector(`#${id} rect`);
}
const myStarsClip  = buildStarSvg(document.getElementById('myStars'));
const oppStarsClip = buildStarSvg(document.getElementById('oppStars'));
function setStars(r, v) { r.setAttribute('width', Math.max(0, Math.min(5, v)) * 100); }

function miniStarsHTML(rating) {
  const pct = Math.max(0, Math.min(5, rating)) / 5 * 100;
  return `<span style="position:relative;display:inline-block;font-size:13px;line-height:1">
    <span style="color:#3a3020">★★★★★</span>
    <span style="color:#ffd24a;position:absolute;top:0;left:0;width:${pct}%;overflow:hidden;white-space:nowrap">★★★★★</span>
  </span>`;
}

// ── STATE ──
let myChess = 3.0;
let myBox   = 2.0;

function closestNamed(arr, v) {
  let best = arr[0], bd = Infinity;
  for (const n of arr) { const d = Math.abs(n.value - v); if (d < bd) { bd = d; best = n; } }
  return best;
}

// ── ISOLINE: returns canvas points where pWin crosses threshold ──
function getIsoline(threshold) {
  const pts = [];
  for (let i = 0; i < NX; i++) {
    for (let j = 0; j < NY - 1; j++) {
      const p1 = pWin(myChess, myBox, chessLevels[i], boxLevels[j]);
      const p2 = pWin(myChess, myBox, chessLevels[i], boxLevels[j + 1]);
      if ((p1 - threshold) * (p2 - threshold) <= 0) {
        const t = Math.abs(p2 - p1) < 1e-9 ? 0.5 : (threshold - p1) / (p2 - p1);
        // Canvas y: interpolated between center of cell j and center of cell j+1
        const yJ  = MARGIN.top + (NY - 1 - j)     * CELL + CELL / 2;
        const yJ1 = MARGIN.top + (NY - 1 - j - 1) * CELL + CELL / 2;
        pts.push({
          x: MARGIN.left + i * CELL + CELL / 2,
          y: yJ + t * (yJ1 - yJ),
        });
        break;
      }
    }
  }
  return pts;
}

function strokeLine(pts, col, width, dash) {
  if (pts.length < 2) return;
  ctx.save();
  ctx.strokeStyle = col;
  ctx.lineWidth = width;
  ctx.setLineDash(dash || []);
  ctx.lineJoin = 'round';
  ctx.beginPath();
  ctx.moveTo(pts[0].x, pts[0].y);
  for (let k = 1; k < pts.length; k++) ctx.lineTo(pts[k].x, pts[k].y);
  ctx.stroke();
  ctx.restore();
}

// ── DRAW ──
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // heatmap cells
  for (let j = 0; j < NY; j++) {
    for (let i = 0; i < NX; i++) {
      const { x, y } = cell2px(i, j);
      ctx.fillStyle = color(pWin(myChess, myBox, chessLevels[i], boxLevels[j]));
      ctx.fillRect(x, y, CELL, CELL);
    }
  }

  // subtle grid lines
  ctx.strokeStyle = 'rgba(255,255,255,0.04)';
  ctx.lineWidth = 1;
  for (let i = 0; i <= NX; i++) {
    const x = MARGIN.left + i * CELL + 0.5;
    ctx.beginPath(); ctx.moveTo(x, MARGIN.top); ctx.lineTo(x, MARGIN.top + NY * CELL); ctx.stroke();
  }
  for (let j = 0; j <= NY; j++) {
    const y = MARGIN.top + j * CELL + 0.5;
    ctx.beginPath(); ctx.moveTo(MARGIN.left, y); ctx.lineTo(MARGIN.left + NX * CELL, y); ctx.stroke();
  }

  // Midpoint axis reference lines (chess mid = 3.5, boxing mid = 2.5)
  {
    const xMid = MARGIN.left + NX * CELL / 2;
    const yMid = MARGIN.top  + NY * CELL / 2;
    ctx.save();
    ctx.strokeStyle = 'rgba(255,255,255,0.14)';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 6]);
    ctx.beginPath(); ctx.moveTo(xMid, MARGIN.top); ctx.lineTo(xMid, MARGIN.top + NY * CELL); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(MARGIN.left, yMid); ctx.lineTo(MARGIN.left + NX * CELL, yMid); ctx.stroke();
    ctx.restore();
  }

  // ── FAIR FIGHT ZONE: soft fill on 45-55% cells ──
  ctx.fillStyle = 'rgba(255,245,180,0.06)';
  for (let j = 0; j < NY; j++) {
    for (let i = 0; i < NX; i++) {
      const p = pWin(myChess, myBox, chessLevels[i], boxLevels[j]);
      if (p >= 0.45 && p <= 0.55) {
        const { x, y } = cell2px(i, j);
        ctx.fillRect(x, y, CELL, CELL);
      }
    }
  }

  // ── ISOLINES: strong gold center line, lighter white secondary contours ──
  strokeLine(getIsoline(0.10), 'rgba(255,255,255,0.34)', 1.1, [2, 2]);
  strokeLine(getIsoline(0.25), 'rgba(255,255,255,0.48)', 1.5, [4, 2]);
  strokeLine(getIsoline(0.45), 'rgba(255,255,255,0.72)', 2, [6, 2]);
  strokeLine(getIsoline(0.55), 'rgba(255,255,255,0.72)', 2, [6, 2]);
  strokeLine(getIsoline(0.75), 'rgba(255,255,255,0.48)', 1.5, [4, 2]);
  strokeLine(getIsoline(0.90), 'rgba(255,255,255,0.34)', 1.1, [2, 2]);
  strokeLine(getIsoline(0.50), 'rgba(245,200,66,0.98)', 3.5);

  // ── SELECTED CELL: gold diamond marker ──
  const myI = Math.round((myChess - CHESS_MIN) / CHESS_STEP);
  const myJ = Math.round((myBox   - BOX_MIN)   / BOX_STEP);
  const sel = cell2px(myI, myJ);
  const cx = sel.x + CELL / 2, cy = sel.y + CELL / 2;
  const ds = CELL / 2 + 3; // diamond half-size (extends slightly beyond cell)
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(cx, cy - ds);
  ctx.lineTo(cx + ds, cy);
  ctx.lineTo(cx, cy + ds);
  ctx.lineTo(cx - ds, cy);
  ctx.closePath();
  ctx.fillStyle = 'rgba(245,200,66,0.92)';
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.8)';
  ctx.lineWidth = 1.5;
  ctx.stroke();
  ctx.restore();

  // axis frame
  ctx.lineWidth = 1; ctx.strokeStyle = '#3a3a4a';
  ctx.strokeRect(MARGIN.left + 0.5, MARGIN.top + 0.5, NX * CELL, NY * CELL);

  // ── X AXIS (chess) ──
  ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  for (let v = CHESS_MIN; v <= CHESS_MAX; v++) {
    const i = Math.round((v - CHESS_MIN) / CHESS_STEP);
    const x = MARGIN.left + i * CELL + CELL / 2;
    const yTop = MARGIN.top + NY * CELL;
    ctx.beginPath(); ctx.moveTo(x, yTop); ctx.lineTo(x, yTop + 5);
    ctx.strokeStyle = '#5a5a6a'; ctx.lineWidth = 1; ctx.stroke();
    ctx.font = '11px system-ui'; ctx.fillStyle = '#c8b880';
    ctx.fillText(CHESS_NAMED[v] ? CHESS_NAMED[v].short.split(' ')[0] : v, x, yTop + 7);
    ctx.font = '10px ' + getComputedStyle(document.body).getPropertyValue('--font-mono');
    ctx.fillStyle = '#7a6a40';
    ctx.fillText(eloOf(v), x, yTop + 21);
  }
  ctx.font = 'bold 11px system-ui'; ctx.fillStyle = '#8888a0';
  ctx.fillText('Chess level  (ELO)', MARGIN.left + NX * CELL / 2, MARGIN.top + NY * CELL + 40);

  // ── Y AXIS (boxing) ──
  ctx.font = '11px system-ui'; ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
  for (let v = BOX_MIN; v <= BOX_MAX; v++) {
    const j = Math.round((v - BOX_MIN) / BOX_STEP);
    const { y } = cell2px(0, j);
    ctx.beginPath(); ctx.moveTo(MARGIN.left - 5, y + CELL/2); ctx.lineTo(MARGIN.left, y + CELL/2);
    ctx.strokeStyle = '#5a5a6a'; ctx.lineWidth = 1; ctx.stroke();
    ctx.fillStyle = '#c8b880';
    ctx.fillText(BOXING_NAMED[v] ? BOXING_NAMED[v].short : v, MARGIN.left - 8, y + CELL/2);
  }
  ctx.save();
  ctx.translate(16, MARGIN.top + NY * CELL / 2);
  ctx.rotate(-Math.PI / 2);
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.font = 'bold 11px system-ui'; ctx.fillStyle = '#8888a0';
  ctx.fillText('Boxing level', 0, 0);
  ctx.restore();

  // title strip
  ctx.font = 'bold 10px system-ui'; ctx.textAlign = 'left'; ctx.textBaseline = 'top';
  ctx.fillStyle = '#6a6a80';
  ctx.fillText('Opponent grid — color = your win probability', MARGIN.left, 12);
}

// ── UPDATE FIGHTER CARD ──
function updateMine() {
  const i = Math.round((myChess - CHESS_MIN) / CHESS_STEP);
  const j = Math.round((myBox   - BOX_MIN)   / BOX_STEP);
  const cn = chessCategory(myChess);
  document.getElementById('myChessLabel').textContent = cn.short;
  document.getElementById('myElo').textContent        = 'ELO ' + eloOf(myChess);
  document.getElementById('myBoxLabel').textContent   = boxLabel(myBox);
  document.getElementById('myRating').textContent     = 'Top ' + Math.max(1, Math.round((1 - rankOf(i,j)) * 100)) + '%';
  setStars(myStarsClip, starsOf(i, j));

  // keep fight card my-corner in sync
  document.getElementById('fc-my-chess').textContent = cn.short;
  document.getElementById('fc-my-elo').textContent   = 'ELO ' + eloOf(myChess);
  document.getElementById('fc-my-box').textContent   = boxLabel(myBox);

  // refresh fight card if open
  if (currentOppIdx && fightCard.classList.contains('visible')) showFightCard(currentOppIdx);
}

// ── OUTCOME ──
function outcomeLabel(p) {
  if (p > 0.70) return 'Dominate';
  if (p > 0.55) return 'Win';
  if (p >= 0.45) return 'Even';
  if (p > 0.30) return 'Tough';
  return 'Long shot';
}
function outcomeColor(p) {
  if (p > 0.55) return '#39d353';
  if (p >= 0.45) return '#4a9eff';
  return '#e03c3c';
}

// ── FIGHT CARD ──
const fightCard = document.getElementById('fight-card');
let currentOppIdx = null;

function showFightCard(idx) {
  if (!idx) return;
  currentOppIdx = idx;
  const oc = chessLevels[idx.i], ob = boxLevels[idx.j];
  const p   = pWin(myChess, myBox, oc, ob);
  const cn  = chessCategory(oc);
  const col = outcomeColor(p);

  document.getElementById('hChess').textContent = cn.short;
  document.getElementById('hElo').textContent   = 'ELO ' + eloOf(oc);
  document.getElementById('hBox').textContent   = boxLabel(ob);
  document.getElementById('hP').textContent     = Math.round(p * 100) + '%';
  document.getElementById('hP').style.color     = col;
  document.getElementById('fc-outcome-label').textContent = outcomeLabel(p);
  document.getElementById('fc-outcome').style.borderColor = col;

  const chessBar = 50 + (myChess - oc) / (CHESS_MAX - CHESS_MIN) * 50;
  const boxBar   = 50 + (myBox   - ob) / (BOX_MAX   - BOX_MIN)   * 50;
  document.getElementById('fc-chess-bar').style.width = Math.max(2, Math.min(98, chessBar)) + '%';
  document.getElementById('fc-box-bar').style.width   = Math.max(2, Math.min(98, boxBar))   + '%';

  const eloDiff = eloOf(myChess) - eloOf(oc);
  const boxDiff = +(myBox - ob).toFixed(1);
  const signStr = v => v > 0 ? '+' : '';
  const diffCol = v => v > 0 ? '#39d353' : v < 0 ? '#e03c3c' : '#9090a8';
  const cdEl = document.getElementById('fc-chess-diff');
  if (cdEl) { cdEl.textContent = signStr(eloDiff) + eloDiff + ' ELO'; cdEl.style.color = diffCol(eloDiff); }
  const bdEl = document.getElementById('fc-box-diff');
  if (bdEl) { bdEl.textContent = signStr(boxDiff) + boxDiff + ' lvl'; bdEl.style.color = diffCol(boxDiff); }

  setStars(oppStarsClip, starsOf(idx.i, idx.j));

  fightCard.classList.add('visible');
}

function dismissFightCard() {
  fightCard.classList.remove('visible');
  currentOppIdx = null;
}

document.getElementById('fc-close-btn').addEventListener('click', dismissFightCard);

let fcTouchStartY = 0;
fightCard.addEventListener('touchstart', e => { fcTouchStartY = e.touches[0].clientY; }, { passive: true });
fightCard.addEventListener('touchend', e => {
  if (e.changedTouches[0].clientY - fcTouchStartY > 60) dismissFightCard();
}, { passive: true });

document.addEventListener('pointerdown', e => {
  if (window.innerWidth < 760 && fightCard.classList.contains('visible')
      && !fightCard.contains(e.target) && e.target !== canvas) {
    dismissFightCard();
  }
});

// ── TOOLTIP ──
const tooltip = document.getElementById('tooltip');

function showTooltip(idx, cssX, cssY) {
  if (!idx) { tooltip.style.display = 'none'; return; }
  const oc  = chessLevels[idx.i], ob = boxLevels[idx.j];
  const p   = pWin(myChess, myBox, oc, ob);
  const cn  = chessCategory(oc);
  const bn  = closestNamed(BOXING_NAMED, ob);
  tooltip.style.display = 'block';
  tooltip.style.left = cssX + 'px';
  tooltip.style.top  = cssY + 'px';
  tooltip.innerHTML =
    `${cn.short} · ${bn.short}  →  <b style="color:${outcomeColor(p)}">${Math.round(p*100)}%</b>` +
    `<span class="tt-stars">${miniStarsHTML(starsOf(idx.i, idx.j))}</span>`;
}

// ── GRID EVENTS ──
function eventCoords(e) {
  const r = canvas.getBoundingClientRect();
  const cssX = e.clientX - r.left, cssY = e.clientY - r.top;
  return { cssX, cssY,
    canvasX: cssX * (canvas.width / r.width),
    canvasY: cssY * (canvas.height / r.height) };
}

let pdTime = 0, pdX = 0, pdY = 0, dragging = false;

canvas.addEventListener('pointerdown', e => {
  e.preventDefault();
  try { canvas.setPointerCapture(e.pointerId); } catch(_) {}
  pdTime = Date.now(); pdX = e.clientX; pdY = e.clientY; dragging = false;
  const { cssX, cssY, canvasX, canvasY } = eventCoords(e);
  showTooltip(px2cell(canvasX, canvasY), cssX, cssY);
});
canvas.addEventListener('pointermove', e => {
  const dx = e.clientX - pdX, dy = e.clientY - pdY;
  if (Math.sqrt(dx*dx + dy*dy) > 6) dragging = true;
  const { cssX, cssY, canvasX, canvasY } = eventCoords(e);
  showTooltip(px2cell(canvasX, canvasY), cssX, cssY);
});
canvas.addEventListener('pointerup', e => {
  const { cssX, cssY, canvasX, canvasY } = eventCoords(e);
  const idx = px2cell(canvasX, canvasY);
  if (!dragging && Date.now() - pdTime < 400 && idx) {
    tooltip.style.display = 'none';
    showFightCard(idx);
  } else {
    tooltip.style.display = 'none';
  }
});
canvas.addEventListener('pointerleave',  () => { tooltip.style.display = 'none'; });
canvas.addEventListener('pointercancel', () => { tooltip.style.display = 'none'; });
canvas.addEventListener('touchstart', e => e.preventDefault(), { passive: false });
canvas.addEventListener('touchmove',  e => e.preventDefault(), { passive: false });
canvas.addEventListener('mousemove', e => {
  if (e.buttons !== 0) return;
  const { cssX, cssY, canvasX, canvasY } = eventCoords(e);
  showTooltip(px2cell(canvasX, canvasY), cssX, cssY);
});

// ── DRUM PICKER ──
function buildDrum(containerEl, namedLevels, initialValue, onSelect) {
  let activeValue = namedLevels.reduce((best, item) =>
    Math.abs(item.value - initialValue) < Math.abs(best - initialValue) ? item.value : best,
    namedLevels[0].value);
  let scrollTimer = null;

  // top spacer
  const topSpacer = document.createElement('div');
  topSpacer.className = 'drum-spacer';
  containerEl.appendChild(topSpacer);

  namedLevels.forEach((item, idx) => {
    const el = document.createElement('div');
    el.className = 'drum-item' + (item.value === activeValue ? ' active' : '');
    el.dataset.value = item.value;
    el.dataset.idx   = idx;
    el.setAttribute('role', 'option');
    el.setAttribute('aria-selected', String(item.value === activeValue));
    el.innerHTML = `<div class="drum-item__name">${item.short}</div><div class="drum-item__sub">${item.sub}</div>`;
    el.addEventListener('click', () => scrollToIdx(idx));
    containerEl.appendChild(el);
  });

  // bottom spacer
  const botSpacer = document.createElement('div');
  botSpacer.className = 'drum-spacer';
  containerEl.appendChild(botSpacer);

  function setActive(val) {
    activeValue = val;
    [...containerEl.querySelectorAll('.drum-item')].forEach(el => {
      const match = Number(el.dataset.value) === val;
      el.classList.toggle('active', match);
      el.setAttribute('aria-selected', String(match));
    });
  }

  function scrollToIdx(idx, smooth = true) {
    const target = idx * ITEM_H;
    if (smooth) {
      containerEl.scrollTo({ top: target, behavior: 'smooth' });
    } else {
      containerEl.scrollTop = target;
    }
    const val = namedLevels[idx].value;
    setActive(val);
    onSelect(val);
  }

  // after scroll settles, snap to nearest integer index
  containerEl.addEventListener('scroll', () => {
    clearTimeout(scrollTimer);
    scrollTimer = setTimeout(() => {
      const raw = containerEl.scrollTop / ITEM_H;
      const idx = Math.max(0, Math.min(namedLevels.length - 1, Math.round(raw)));
      const val = namedLevels[idx].value;
      // snap if not already aligned
      if (Math.abs(raw - idx) > 0.03) {
        containerEl.scrollTo({ top: idx * ITEM_H, behavior: 'smooth' });
      }
      if (val !== activeValue) { setActive(val); onSelect(val); }
    }, 100);
  }, { passive: true });

  // keyboard
  containerEl.addEventListener('keydown', e => {
    const cur = namedLevels.findIndex(x => x.value === activeValue);
    if (e.key === 'ArrowDown' && cur < namedLevels.length - 1) { e.preventDefault(); scrollToIdx(cur + 1); }
    if (e.key === 'ArrowUp'   && cur > 0)                      { e.preventDefault(); scrollToIdx(cur - 1); }
  });

  // init position (delayed to ensure layout is complete)
  setTimeout(() => {
    const initIdx = namedLevels.findIndex(x => x.value === activeValue);
    if (initIdx >= 0) containerEl.scrollTop = initIdx * ITEM_H;
  }, 60);
}

function pulseCard() {
  const card = document.getElementById('my-fighter-card');
  card.classList.remove('pulse');
  void card.offsetWidth;
  card.classList.add('pulse');
  setTimeout(() => card.classList.remove('pulse'), 500);
}

buildDrum(
  document.getElementById('chess-drum'),
  CHESS_DRUM_LEVELS, myChess,
  val => { myChess = val; updateMine(); draw(); pulseCard(); }
);
buildDrum(
  document.getElementById('boxing-drum'),
  BOXING_DRUM_LEVELS, myBox,
  val => { myBox = val; updateMine(); draw(); pulseCard(); }
);

// ── LEGEND BAR ──
(function () {
  const lc = document.getElementById('legendBar');
  const lctx = lc.getContext('2d');
  for (let x = 0; x < lc.width; x++) {
    lctx.fillStyle = color(x / (lc.width - 1));
    lctx.fillRect(x, 0, 1, lc.height);
  }
})();

updateMine();
draw();
</script>

</body>
