<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Chessboxing Skill Evaluator</title>
<style>
:root {
  --bg-deep:        #0a0a0f;
  --bg-panel:       #12121a;
  --bg-panel-alt:   #1a1a26;
  --border:         #2a2a3a;
  --gold-bright:    #f5c842;
  --gold-mid:       #c9922a;
  --gold-dim:       #7a5a18;
  --gold-glow:      rgba(245,200,66,0.18);
  --text-primary:   #f0ead8;
  --text-secondary: #9090a8;
  --text-muted:     #55556a;
  --win-green:      #39d353;
  --lose-red:       #e03c3c;
  --even-blue:      #4a9eff;
  --font-display:   Georgia, 'Times New Roman', serif;
  --font-body:      system-ui, -apple-system, sans-serif;
  --font-mono:      ui-monospace, Menlo, Consolas, monospace;
  --radius-card:    12px;
  --radius-btn:     8px;
}

*, *::before, *::after { box-sizing: border-box; }
html, body { -webkit-text-size-adjust: 100%; margin: 0; padding: 0; }

body {
  font-family: var(--font-body);
  background-color: var(--bg-deep);
  background-image: url('assets/bg-tile.png');
  background-repeat: repeat;
  color: var(--text-primary);
  min-height: 100vh;
}

/* ── HEADER ── */
#site-header {
  text-align: center;
  padding: 40px 20px 28px;
  background-image: url('assets/hero-banner.png');
  background-size: cover;
  background-position: center 40%;
  position: relative;
  border-bottom: 1px solid var(--gold-dim);
}
#site-header::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, rgba(10,10,15,0.55) 0%, rgba(10,10,15,0.78) 100%);
  pointer-events: none;
}
#site-header > * { position: relative; z-index: 1; }

.site-title {
  font-family: var(--font-display);
  font-size: clamp(26px, 8vw, 52px);
  font-weight: 700;
  letter-spacing: 0.14em;
  color: var(--gold-bright);
  text-shadow: 0 0 32px rgba(245,200,66,0.45), 0 2px 0 rgba(0,0,0,0.9);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 14px;
}
.site-title img {
  width: clamp(28px, 5vw, 44px);
  height: clamp(28px, 5vw, 44px);
  object-fit: contain;
  filter: drop-shadow(0 0 6px rgba(245,200,66,0.5));
}
.site-tagline {
  color: var(--text-secondary);
  font-size: 13px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin: 10px 0 0;
}

/* ── MAIN LAYOUT ── */
#main { max-width: 1100px; margin: 0 auto; padding: 0 0 100px; }

/* ── SECTION HEADINGS ── */
.section-title {
  font-family: var(--font-display);
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--gold-bright);
  border-bottom: 1px solid var(--gold-dim);
  padding: 22px 16px 10px;
  margin: 0;
}
.section-hint {
  font-size: 12px;
  color: var(--text-muted);
  font-family: var(--font-body);
  font-weight: 400;
  text-transform: none;
  letter-spacing: 0;
  margin-left: 8px;
}

/* ── FIGHTER SETUP ── */
#fighter-setup { padding: 0 0 8px; }

.carousels-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0;
  border-bottom: 1px solid var(--border);
}

.carousel-block {
  position: relative;
  padding: 14px 0 10px;
  border-right: 1px solid var(--border);
}
.carousel-block:last-child { border-right: none; }

.carousel-label {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-secondary);
  padding: 0 16px 8px;
}
.carousel-label img { width: 18px; height: 18px; object-fit: contain; opacity: 0.8; }

.carousel {
  display: flex;
  overflow-x: auto;
  scroll-snap-type: x mandatory;
  -webkit-overflow-scrolling: touch;
  gap: 8px;
  padding: 4px 40% 10px;
  scrollbar-width: none;
  cursor: grab;
}
.carousel:active { cursor: grabbing; }
.carousel::-webkit-scrollbar { display: none; }

.carousel-item {
  flex: 0 0 130px;
  scroll-snap-align: center;
  scroll-snap-stop: always;
  background: var(--bg-panel-alt);
  border: 1px solid var(--border);
  border-radius: var(--radius-btn);
  padding: 12px 10px 10px;
  text-align: center;
  transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
  cursor: pointer;
  user-select: none;
  -webkit-user-select: none;
}
.carousel-item:hover { border-color: var(--gold-dim); }
.carousel-item.active {
  border-color: var(--gold-bright);
  box-shadow: 0 0 0 2px var(--gold-glow), 0 4px 18px rgba(245,200,66,0.15);
  transform: scale(1.05);
}
.carousel-item__name { font-size: 13px; font-weight: 700; color: var(--text-primary); line-height: 1.2; }
.carousel-item.active .carousel-item__name { color: var(--gold-bright); }
.carousel-item__sub { font-size: 11px; color: var(--text-secondary); margin-top: 4px; line-height: 1.3; }

.carousel-block::before,
.carousel-block::after {
  content: '';
  position: absolute;
  top: 50px; bottom: 14px;
  width: 40px;
  z-index: 2;
  pointer-events: none;
}
.carousel-block::before { left: 0; background: linear-gradient(to right, var(--bg-deep), transparent); }
.carousel-block::after  { right: 0; background: linear-gradient(to left,  var(--bg-deep), transparent); }

/* ── FIGHTER CARD ── */
.fighter-card {
  display: grid;
  grid-template-columns: 1fr auto;
  align-items: center;
  gap: 12px 16px;
  padding: 14px 20px;
  background: var(--bg-panel);
  border-bottom: 1px solid var(--border);
  transition: box-shadow 0.3s;
}
@keyframes pulse-gold {
  0%   { box-shadow: inset 0 0 0 0 rgba(245,200,66,0); }
  40%  { box-shadow: inset 0 0 0 2px rgba(245,200,66,0.5); }
  100% { box-shadow: inset 0 0 0 0 rgba(245,200,66,0); }
}
.fighter-card.pulse { animation: pulse-gold 0.5s ease; }

.fighter-card__label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--gold-dim);
  margin-bottom: 4px;
}
.fighter-card__levels { font-size: 13px; font-weight: 600; color: var(--text-primary); line-height: 1.5; }
.fighter-card__levels .sub { color: var(--text-secondary); font-weight: 400; font-size: 11px; display: block; }

.fighter-card__right { text-align: right; }
.fighter-card__rank { font-size: 11px; color: var(--text-secondary); margin-top: 4px; font-family: var(--font-mono); }

/* ── EXPLORE GRID ── */
#explore-section { padding-bottom: 16px; }

#grid-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 12px 12px 0;
  gap: 10px;
}

#grid-container { position: relative; max-width: 100%; }

canvas#grid {
  display: block;
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: 6px;
  max-width: 100%;
  height: auto;
  touch-action: none;
  user-select: none;
  -webkit-user-select: none;
  cursor: crosshair;
}

#tooltip {
  position: absolute;
  pointer-events: none;
  background: rgba(12,12,20,0.96);
  color: var(--text-primary);
  padding: 6px 10px;
  border-radius: 6px;
  border: 1px solid var(--border);
  font: 12px/1.35 var(--font-mono);
  white-space: nowrap;
  transform: translate(-50%, calc(-100% - 14px));
  display: none;
  z-index: 10;
  box-shadow: 0 4px 16px rgba(0,0,0,0.5);
  max-width: 90vw;
}
#tooltip .tt-stars { display: block; margin-top: 4px; }

.legend-row {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 12px;
  color: var(--text-secondary);
  width: 100%;
  max-width: 520px;
  padding: 0 4px;
}
.legend-row canvas { flex: 1; border-radius: 3px; border: 1px solid var(--border); }

.legend-markers {
  display: flex;
  gap: 18px;
  font-size: 12px;
  color: var(--text-secondary);
  padding: 0 4px;
  width: 100%;
  max-width: 520px;
}
.swatch {
  display: inline-block;
  width: 12px; height: 12px;
  border-radius: 2px;
  vertical-align: middle;
  margin-right: 5px;
  border: 1px solid rgba(255,255,255,0.15);
}
.you-mark { background: #f5c842; }
.fair-mark { background: transparent; outline: 2px solid rgba(255,255,255,0.65); outline-offset: -1px; }

/* ── FIGHT CARD ── */
#fight-card {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: var(--bg-panel);
  border-top: 2px solid var(--gold-mid);
  border-radius: 18px 18px 0 0;
  padding: 0 0 env(safe-area-inset-bottom, 16px);
  z-index: 200;
  transform: translateY(100%);
  transition: transform 0.32s cubic-bezier(0.32,0.72,0,1);
  box-shadow: 0 -8px 48px rgba(0,0,0,0.7);
  max-height: 80vh;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
#fight-card.visible { transform: translateY(0); }

.fc-handle {
  width: 36px; height: 4px;
  background: var(--border);
  border-radius: 2px;
  margin: 10px auto 0;
}

.fc-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 18px 0;
}
.fc-title {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--gold-dim);
}
.fc-close {
  background: none;
  border: none;
  color: var(--text-muted);
  font-size: 18px;
  cursor: pointer;
  padding: 4px 8px;
  line-height: 1;
  border-radius: 4px;
  transition: color 0.15s;
}
.fc-close:hover { color: var(--text-primary); }

.fc-fighters {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  gap: 10px;
  padding: 14px 18px 10px;
}

.fc-fighter { display: flex; flex-direction: column; gap: 3px; }
.fc-fighter--a  { text-align: left; }
.fc-fighter--opp { text-align: right; }

.fc-corner {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-muted);
}
.fc-fighter--a .fc-corner { color: var(--gold-dim); }

.fc-chess-level { font-size: 13px; font-weight: 700; color: var(--text-primary); line-height: 1.2; }
.fc-box-level   { font-size: 12px; color: var(--text-secondary); }
.fc-stars-row   { margin-top: 4px; }

.fc-outcome {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  width: 72px; height: 72px;
  border-radius: 50%;
  background: var(--bg-panel-alt);
  border: 2px solid var(--gold-mid);
  transition: border-color 0.3s;
  flex-shrink: 0;
}
.fc-outcome__prob {
  font-size: 17px;
  font-weight: 700;
  font-family: var(--font-mono);
  color: var(--gold-bright);
  line-height: 1;
  transition: color 0.3s;
}
.fc-outcome__label {
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-secondary);
  margin-top: 3px;
}

.fc-divider {
  width: calc(100% - 36px);
  height: 32px;
  display: block;
  margin: 0 auto;
  object-fit: contain;
  opacity: 0.55;
}

.fc-bars {
  padding: 0 18px 18px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.fc-bar-row {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 11px;
  color: var(--text-secondary);
}
.fc-bar-row span { flex: 0 0 90px; text-align: right; }
.fc-bar {
  flex: 1;
  height: 6px;
  background: var(--bg-panel-alt);
  border-radius: 3px;
  overflow: hidden;
  position: relative;
}
.fc-bar__fill {
  position: absolute;
  left: 0; top: 0; bottom: 0;
  border-radius: 3px;
  background: var(--gold-bright);
  transition: width 0.4s ease;
}

/* ── DESKTOP ── */
@media (min-width: 760px) {
  #main {
    display: grid;
    grid-template-columns: 320px 1fr;
    align-items: start;
    padding-bottom: 40px;
  }
  .section-title { padding: 22px 20px 10px; }

  #fighter-setup {
    grid-column: 1;
    grid-row: 1 / 3;
    border-right: 1px solid var(--border);
    position: sticky;
    top: 0;
    max-height: 100vh;
    overflow-y: auto;
  }

  #explore-section { grid-column: 2; grid-row: 1; }

  .carousels-row { grid-template-columns: 1fr; }
  .carousel-block { border-right: none; border-bottom: 1px solid var(--border); }
  .carousel-block:last-of-type { border-bottom: none; }
  .carousel { padding: 4px 35% 10px; }

  /* fight card inline on desktop */
  #fight-card {
    position: static;
    transform: none !important;
    border-radius: var(--radius-card);
    border: 1px solid var(--gold-mid);
    box-shadow: none;
    max-height: none;
    margin: 12px 16px 16px;
    padding-bottom: 0;
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.2s, visibility 0.2s;
  }
  #fight-card.visible { opacity: 1; visibility: visible; }
  .fc-handle { display: none; }
}

@media (max-width: 420px) {
  .carousel-item { flex: 0 0 110px; }
  .site-title { letter-spacing: 0.08em; }
}
</style>
</head>
<body>

<header id="site-header">
  <div class="site-title">
    <img src="assets/icon-chess.png" alt="">
    CHESSBOXING
    <img src="assets/icon-boxing.png" alt="">
  </div>
  <p class="site-tagline">Where do you stand in the ring?</p>
</header>

<div id="main">

  <section id="fighter-setup">
    <h2 class="section-title">Your Profile</h2>

    <div class="carousels-row">
      <div class="carousel-block">
        <div class="carousel-label">
          <img src="assets/icon-chess.png" alt="">Chess
        </div>
        <div class="carousel" id="chess-carousel" role="listbox" aria-label="Chess level" tabindex="0"></div>
      </div>
      <div class="carousel-block">
        <div class="carousel-label">
          <img src="assets/icon-boxing.png" alt="">Boxing
        </div>
        <div class="carousel" id="boxing-carousel" role="listbox" aria-label="Boxing level" tabindex="0"></div>
      </div>
    </div>

    <div class="fighter-card" id="my-fighter-card">
      <div>
        <div class="fighter-card__label">Your Corner</div>
        <div class="fighter-card__levels">
          <span id="myChessLabel">—</span>
          <span class="sub" id="myBoxLabel">—</span>
        </div>
      </div>
      <div class="fighter-card__right">
        <svg class="stars-svg" id="myStars" width="120" height="24" viewBox="0 0 500 100"></svg>
        <div class="fighter-card__rank" id="myRating">—</div>
      </div>
    </div>

    <div id="fight-card">
      <div class="fc-handle"></div>
      <div class="fc-header">
        <span class="fc-title">Fight Card</span>
        <button class="fc-close" id="fc-close-btn" aria-label="Close">✕</button>
      </div>
      <div class="fc-fighters">
        <div class="fc-fighter fc-fighter--a">
          <div class="fc-corner">Your Corner</div>
          <div class="fc-chess-level" id="fc-my-chess">—</div>
          <div class="fc-box-level"   id="fc-my-box">—</div>
        </div>
        <div class="fc-outcome" id="fc-outcome">
          <div class="fc-outcome__prob"  id="hP">—</div>
          <div class="fc-outcome__label" id="fc-outcome-label">vs</div>
        </div>
        <div class="fc-fighter fc-fighter--opp">
          <div class="fc-corner">Opponent</div>
          <div class="fc-chess-level" id="hChess">—</div>
          <div class="fc-box-level"   id="hBox">—</div>
          <div class="fc-stars-row">
            <svg class="stars-svg" id="oppStars" width="100" height="20" viewBox="0 0 500 100"></svg>
          </div>
        </div>
      </div>
      <img src="assets/divider.png" class="fc-divider" alt="">
      <div class="fc-bars">
        <div class="fc-bar-row">
          <span>Chess edge</span>
          <div class="fc-bar"><div class="fc-bar__fill" id="fc-chess-bar" style="width:50%"></div></div>
        </div>
        <div class="fc-bar-row">
          <span>Boxing edge</span>
          <div class="fc-bar"><div class="fc-bar__fill" id="fc-box-bar" style="width:50%"></div></div>
        </div>
      </div>
    </div>
  </section>

  <section id="explore-section">
    <h2 class="section-title">Explore Matchups <span class="section-hint">tap a cell to see that fight</span></h2>
    <div id="grid-wrap">
      <div id="grid-container">
        <canvas id="grid"></canvas>
        <div id="tooltip"></div>
      </div>
      <div class="legend-row">
        <span>You lose</span>
        <canvas id="legendBar" width="220" height="10"></canvas>
        <span>You win</span>
      </div>
      <div class="legend-markers">
        <span><span class="swatch you-mark"></span>Your level</span>
        <span><span class="swatch fair-mark"></span>Even fight zone (45–55 %)</span>
      </div>
    </div>
  </section>

</div>

<script>
// ── CONFIG ──
const CHESS_MIN = 0, CHESS_MAX = 7, CHESS_STEP = 0.2;
const BOX_MIN   = 0, BOX_MAX   = 5, BOX_STEP   = 0.2;
const CELL = 14;
const MARGIN = { top: 36, right: 24, bottom: 60, left: 78 };

const CHESS_NAMED = [
  { value: 0, short: 'Total Beginner', sub: '800 ELO'  },
  { value: 1, short: 'Beginner',       sub: '1028 ELO' },
  { value: 2, short: 'Casual Player',  sub: '1257 ELO' },
  { value: 3, short: 'Club Player',    sub: '1485 ELO' },
  { value: 4, short: 'Strong Club',    sub: '1714 ELO' },
  { value: 5, short: 'Expert',         sub: '1942 ELO' },
  { value: 6, short: 'Master',         sub: '2171 ELO' },
  { value: 7, short: 'Elite / GM',     sub: '2400 ELO' },
];
const BOXING_NAMED = [
  { value: 0, short: 'Novice',       sub: 'Never sparred'       },
  { value: 1, short: 'Beginner',     sub: 'Gym < 1 year'        },
  { value: 2, short: 'Amateur',      sub: '1–3 years training'  },
  { value: 3, short: 'Regional',     sub: 'First amateur bouts' },
  { value: 4, short: 'Semi-Pro',     sub: '10+ fights'          },
  { value: 5, short: 'Professional', sub: '40+ fights or pro'   },
];

function buildLevels(min, max, step) {
  const out = [];
  const n = Math.round((max - min) / step) + 1;
  for (let k = 0; k < n; k++) out.push(+(min + k * step).toFixed(2));
  return out;
}
const chessLevels = buildLevels(CHESS_MIN, CHESS_MAX, CHESS_STEP);
const boxLevels   = buildLevels(BOX_MIN,   BOX_MAX,   BOX_STEP);
const NX = chessLevels.length;
const NY = boxLevels.length;

// ── CANVAS ──
const canvas = document.getElementById('grid');
canvas.width  = MARGIN.left + NX * CELL + MARGIN.right;
canvas.height = MARGIN.top  + NY * CELL + MARGIN.bottom;
const ctx = canvas.getContext('2d');

// ── MODEL ──
const sigmoid = x => 1 / (1 + Math.exp(-x));
function pWin(myC, myB, oppC, oppB) {
  return sigmoid(2 * Math.tanh((myC - oppC) / 3) + (myB - oppB));
}
const eloOf = c => Math.round(800 + c * (1600 / 7));

// ── COLOR SCALE (deep purple → electric blue → gold) ──
function color(p) {
  const cLow  = [26,  10,  46];
  const cMid  = [30,  55, 153];
  const cHigh = [245, 200,  66];
  let a, b, t;
  if (p < 0.5) { a = cLow; b = cMid;  t = p / 0.5; }
  else         { a = cMid; b = cHigh; t = (p - 0.5) / 0.5; }
  return `rgb(${Math.round(a[0]+(b[0]-a[0])*t)},${Math.round(a[1]+(b[1]-a[1])*t)},${Math.round(a[2]+(b[2]-a[2])*t)})`;
}

// ── COORD HELPERS ──
function cell2px(i, j) {
  return { x: MARGIN.left + i * CELL, y: MARGIN.top + (NY - 1 - j) * CELL };
}
function px2cell(px, py) {
  const i = Math.floor((px - MARGIN.left) / CELL);
  const j = NY - 1 - Math.floor((py - MARGIN.top) / CELL);
  if (i < 0 || i >= NX || j < 0 || j >= NY) return null;
  return { i, j };
}

// ── RATINGS ──
const avgP = new Float32Array(NX * NY);
for (let j = 0; j < NY; j++) {
  for (let i = 0; i < NX; i++) {
    const c1 = chessLevels[i], b1 = boxLevels[j];
    let sum = 0;
    for (let j2 = 0; j2 < NY; j2++) for (let i2 = 0; i2 < NX; i2++) sum += pWin(c1, b1, chessLevels[i2], boxLevels[j2]);
    avgP[j * NX + i] = sum / (NX * NY);
  }
}
let minAvg = Infinity, maxAvg = -Infinity;
for (let k = 0; k < avgP.length; k++) {
  if (avgP[k] < minAvg) minAvg = avgP[k];
  if (avgP[k] > maxAvg) maxAvg = avgP[k];
}
function rankOf(i, j)  { return (avgP[j * NX + i] - minAvg) / (maxAvg - minAvg); }
function starsOf(i, j) { return rankOf(i, j) * 5; }

// ── STARS SVG ──
const STAR_PATH = "M50 6 L62 38 L96 40 L70 60 L80 92 L50 74 L20 92 L30 60 L4 40 L38 38 Z";
function buildStarSvg(svgEl) {
  const id = 'cp_' + Math.random().toString(36).slice(2, 9);
  let bg = '', fg = '';
  for (let k = 0; k < 5; k++) {
    bg += `<g transform="translate(${k*100},0)"><path d="${STAR_PATH}" fill="#2a2a1a" stroke="#5a4a18" stroke-width="2"/></g>`;
    fg += `<g transform="translate(${k*100},0)"><path d="${STAR_PATH}" fill="#f5b800" stroke="#c98e0a" stroke-width="2"/></g>`;
  }
  svgEl.innerHTML = `<defs><clipPath id="${id}"><rect x="0" y="0" width="0" height="100"/></clipPath></defs>
    <g>${bg}</g><g clip-path="url(#${id})">${fg}</g>`;
  return svgEl.querySelector(`#${id} rect`);
}
const myStarsClip  = buildStarSvg(document.getElementById('myStars'));
const oppStarsClip = buildStarSvg(document.getElementById('oppStars'));
function setStars(r, v) { r.setAttribute('width', Math.max(0, Math.min(5, v)) * 100); }

function miniStarsHTML(rating) {
  const pct = Math.max(0, Math.min(5, rating)) / 5 * 100;
  return `<span style="position:relative;display:inline-block;font-size:13px;line-height:1">
    <span style="color:#3a3020">★★★★★</span>
    <span style="color:#ffd24a;position:absolute;top:0;left:0;width:${pct}%;overflow:hidden;white-space:nowrap">★★★★★</span>
  </span>`;
}

// ── STATE ──
let myChess = 3.0;
let myBox   = 2.0;

// ── NAMED LEVEL HELPERS ──
function closestNamed(arr, v) {
  let best = arr[0], bd = Infinity;
  for (const n of arr) { const d = Math.abs(n.value - v); if (d < bd) { bd = d; best = n; } }
  return best;
}

// ── DRAW ──
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  for (let j = 0; j < NY; j++) {
    for (let i = 0; i < NX; i++) {
      const { x, y } = cell2px(i, j);
      ctx.fillStyle = color(pWin(myChess, myBox, chessLevels[i], boxLevels[j]));
      ctx.fillRect(x, y, CELL, CELL);
    }
  }

  ctx.strokeStyle = 'rgba(255,255,255,0.05)';
  ctx.lineWidth = 1;
  for (let i = 0; i <= NX; i++) {
    const x = MARGIN.left + i * CELL + 0.5;
    ctx.beginPath(); ctx.moveTo(x, MARGIN.top); ctx.lineTo(x, MARGIN.top + NY * CELL); ctx.stroke();
  }
  for (let j = 0; j <= NY; j++) {
    const y = MARGIN.top + j * CELL + 0.5;
    ctx.beginPath(); ctx.moveTo(MARGIN.left, y); ctx.lineTo(MARGIN.left + NX * CELL, y); ctx.stroke();
  }

  // 50 % band
  ctx.lineWidth = 1.6; ctx.strokeStyle = 'rgba(255,255,255,0.65)';
  for (let j = 0; j < NY; j++) {
    for (let i = 0; i < NX; i++) {
      const p = pWin(myChess, myBox, chessLevels[i], boxLevels[j]);
      if (p >= 0.45 && p <= 0.55) {
        const { x, y } = cell2px(i, j);
        ctx.strokeRect(x + 0.8, y + 0.8, CELL - 1.6, CELL - 1.6);
      }
    }
  }

  // selected cell
  const myI = Math.round((myChess - CHESS_MIN) / CHESS_STEP);
  const myJ = Math.round((myBox   - BOX_MIN)   / BOX_STEP);
  const sel = cell2px(myI, myJ);
  ctx.lineWidth = 3; ctx.strokeStyle = '#f5c842';
  ctx.strokeRect(sel.x - 1.5, sel.y - 1.5, CELL + 3, CELL + 3);
  ctx.fillStyle = '#f5c842';
  ctx.fillRect(sel.x + CELL/2 - 2, sel.y + CELL/2 - 2, 4, 4);

  // axis frame
  ctx.lineWidth = 1; ctx.strokeStyle = '#3a3a4a';
  ctx.strokeRect(MARGIN.left + 0.5, MARGIN.top + 0.5, NX * CELL, NY * CELL);

  // X axis labels (use first word of chess name)
  ctx.font = '11px system-ui'; ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  for (let v = CHESS_MIN; v <= CHESS_MAX; v++) {
    const i = Math.round((v - CHESS_MIN) / CHESS_STEP);
    const x = MARGIN.left + i * CELL + CELL / 2;
    const yTop = MARGIN.top + NY * CELL;
    ctx.beginPath(); ctx.moveTo(x, yTop); ctx.lineTo(x, yTop + 4); ctx.strokeStyle = '#5a5a6a'; ctx.stroke();
    ctx.fillStyle = '#c0b890';
    ctx.fillText(CHESS_NAMED[v] ? CHESS_NAMED[v].short.split(' ')[0] : v, x, yTop + 6);
    ctx.fillStyle = '#6a6a80';
    ctx.fillText(eloOf(v), x, yTop + 20);
  }
  ctx.font = 'bold 12px system-ui'; ctx.fillStyle = '#9090a8';
  ctx.fillText('Chess level  (ELO)', MARGIN.left + NX * CELL / 2, MARGIN.top + NY * CELL + 38);

  // Y axis labels
  ctx.font = '11px system-ui'; ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
  for (let v = BOX_MIN; v <= BOX_MAX; v++) {
    const j = Math.round((v - BOX_MIN) / BOX_STEP);
    const { y } = cell2px(0, j);
    ctx.beginPath(); ctx.moveTo(MARGIN.left - 4, y + CELL/2); ctx.lineTo(MARGIN.left, y + CELL/2);
    ctx.strokeStyle = '#5a5a6a'; ctx.stroke();
    ctx.fillStyle = '#c0b890';
    ctx.fillText(BOXING_NAMED[v] ? BOXING_NAMED[v].short : v, MARGIN.left - 7, y + CELL/2);
  }
  ctx.save();
  ctx.translate(16, MARGIN.top + NY * CELL / 2);
  ctx.rotate(-Math.PI / 2);
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.font = 'bold 12px system-ui'; ctx.fillStyle = '#9090a8';
  ctx.fillText('Boxing level', 0, 0);
  ctx.restore();

  ctx.font = 'bold 11px system-ui'; ctx.textAlign = 'left'; ctx.textBaseline = 'top';
  ctx.fillStyle = '#9090a8';
  ctx.fillText('Opponent skill grid — color = your win probability', MARGIN.left, 10);
}

// ── UPDATE FIGHTER CARD ──
function updateMine() {
  const i = Math.round((myChess - CHESS_MIN) / CHESS_STEP);
  const j = Math.round((myBox   - BOX_MIN)   / BOX_STEP);
  const cn = closestNamed(CHESS_NAMED, myChess);
  const bn = closestNamed(BOXING_NAMED, myBox);
  document.getElementById('myChessLabel').textContent = cn.short + ' · ' + cn.sub;
  document.getElementById('myBoxLabel').textContent   = bn.short + ' · ' + bn.sub;
  document.getElementById('myRating').textContent = 'Top ' + Math.max(1, Math.round((1 - rankOf(i,j)) * 100)) + '%';
  setStars(myStarsClip, starsOf(i, j));
  document.getElementById('fc-my-chess').textContent = cn.short;
  document.getElementById('fc-my-box').textContent   = bn.short;
}

// ── OUTCOME ──
function outcomeLabel(p) {
  if (p > 0.70) return 'Dominate';
  if (p > 0.55) return 'Win';
  if (p >= 0.45) return 'Even';
  if (p > 0.30) return 'Tough';
  return 'Long shot';
}
function outcomeColor(p) {
  if (p > 0.55) return '#39d353';
  if (p >= 0.45) return '#4a9eff';
  return '#e03c3c';
}

// ── FIGHT CARD ──
const fightCard = document.getElementById('fight-card');

function showFightCard(idx) {
  if (!idx) return;
  const oc = chessLevels[idx.i], ob = boxLevels[idx.j];
  const p  = pWin(myChess, myBox, oc, ob);
  const cn = closestNamed(CHESS_NAMED, oc);
  const bn = closestNamed(BOXING_NAMED, ob);
  const col = outcomeColor(p);

  document.getElementById('hChess').textContent = cn.short;
  document.getElementById('hBox').textContent   = bn.short;
  document.getElementById('hP').textContent     = Math.round(p * 100) + '%';
  document.getElementById('hP').style.color     = col;
  document.getElementById('fc-outcome-label').textContent = outcomeLabel(p);
  document.getElementById('fc-outcome').style.borderColor = col;

  const chessBar = 50 + (myChess - oc) / (CHESS_MAX - CHESS_MIN) * 50;
  const boxBar   = 50 + (myBox   - ob) / (BOX_MAX   - BOX_MIN)   * 50;
  document.getElementById('fc-chess-bar').style.width = Math.max(2, Math.min(98, chessBar)) + '%';
  document.getElementById('fc-box-bar').style.width   = Math.max(2, Math.min(98, boxBar))   + '%';
  setStars(oppStarsClip, starsOf(idx.i, idx.j));

  fightCard.classList.add('visible');
}

function dismissFightCard() { fightCard.classList.remove('visible'); }

document.getElementById('fc-close-btn').addEventListener('click', dismissFightCard);

let fcTouchStartY = 0;
fightCard.addEventListener('touchstart', e => { fcTouchStartY = e.touches[0].clientY; }, { passive: true });
fightCard.addEventListener('touchend', e => {
  if (e.changedTouches[0].clientY - fcTouchStartY > 60) dismissFightCard();
}, { passive: true });

document.addEventListener('pointerdown', e => {
  if (window.innerWidth < 760 && fightCard.classList.contains('visible')
      && !fightCard.contains(e.target) && e.target !== canvas) {
    dismissFightCard();
  }
});

// ── TOOLTIP ──
const tooltip = document.getElementById('tooltip');

function showTooltip(idx, cssX, cssY) {
  if (!idx) { tooltip.style.display = 'none'; return; }
  const oc = chessLevels[idx.i], ob = boxLevels[idx.j];
  const p  = pWin(myChess, myBox, oc, ob);
  const cn = closestNamed(CHESS_NAMED, oc);
  const bn = closestNamed(BOXING_NAMED, ob);
  tooltip.style.display = 'block';
  tooltip.style.left = cssX + 'px';
  tooltip.style.top  = cssY + 'px';
  tooltip.innerHTML =
    `${cn.short} · ${bn.short}  →  <b style="color:${outcomeColor(p)}">${Math.round(p*100)}%</b>` +
    `<span class="tt-stars">${miniStarsHTML(starsOf(idx.i, idx.j))}</span>`;
}

// ── GRID EVENTS ──
function eventCoords(e) {
  const r = canvas.getBoundingClientRect();
  const cssX = e.clientX - r.left, cssY = e.clientY - r.top;
  return { cssX, cssY,
    canvasX: cssX * (canvas.width  / r.width),
    canvasY: cssY * (canvas.height / r.height) };
}

let pointerDownTime = 0, pointerDownX = 0, pointerDownY = 0, isDragging = false;

canvas.addEventListener('pointerdown', e => {
  e.preventDefault();
  try { canvas.setPointerCapture(e.pointerId); } catch(_) {}
  pointerDownTime = Date.now();
  pointerDownX = e.clientX; pointerDownY = e.clientY;
  isDragging = false;
  const { cssX, cssY, canvasX, canvasY } = eventCoords(e);
  showTooltip(px2cell(canvasX, canvasY), cssX, cssY);
});

canvas.addEventListener('pointermove', e => {
  const dx = e.clientX - pointerDownX, dy = e.clientY - pointerDownY;
  if (Math.sqrt(dx*dx + dy*dy) > 6) isDragging = true;
  const { cssX, cssY, canvasX, canvasY } = eventCoords(e);
  showTooltip(px2cell(canvasX, canvasY), cssX, cssY);
});

canvas.addEventListener('pointerup', e => {
  const { cssX, cssY, canvasX, canvasY } = eventCoords(e);
  const idx = px2cell(canvasX, canvasY);
  if (!isDragging && Date.now() - pointerDownTime < 400 && idx) {
    tooltip.style.display = 'none';
    showFightCard(idx);
  } else {
    tooltip.style.display = 'none';
  }
});

canvas.addEventListener('pointerleave',  () => { tooltip.style.display = 'none'; });
canvas.addEventListener('pointercancel', () => { tooltip.style.display = 'none'; });
canvas.addEventListener('touchstart', e => e.preventDefault(), { passive: false });
canvas.addEventListener('touchmove',  e => e.preventDefault(), { passive: false });

canvas.addEventListener('mousemove', e => {
  if (e.buttons !== 0) return;
  const { cssX, cssY, canvasX, canvasY } = eventCoords(e);
  showTooltip(px2cell(canvasX, canvasY), cssX, cssY);
});

// ── CAROUSEL ──
function buildCarousel(containerEl, namedLevels, initialValue, onSelect) {
  let activeValue = Math.round(initialValue);

  namedLevels.forEach(item => {
    const el = document.createElement('div');
    el.className = 'carousel-item' + (item.value === activeValue ? ' active' : '');
    el.dataset.value = item.value;
    el.setAttribute('role', 'option');
    el.setAttribute('aria-selected', String(item.value === activeValue));
    el.innerHTML = `<div class="carousel-item__name">${item.short}</div><div class="carousel-item__sub">${item.sub}</div>`;
    el.addEventListener('click', () => scrollToValue(item.value));
    containerEl.appendChild(el);
  });

  function getItems() { return [...containerEl.querySelectorAll('.carousel-item')]; }

  function setActive(val) {
    activeValue = val;
    getItems().forEach(el => {
      const match = Number(el.dataset.value) === val;
      el.classList.toggle('active', match);
      el.setAttribute('aria-selected', String(match));
    });
  }

  function scrollToValue(val, smooth = true) {
    const el = containerEl.querySelector(`[data-value="${val}"]`);
    if (!el) return;
    el.scrollIntoView({ behavior: smooth ? 'smooth' : 'instant', inline: 'center', block: 'nearest' });
    setActive(val);
    onSelect(val);
  }

  let scrollTimer = null;
  containerEl.addEventListener('scroll', () => {
    clearTimeout(scrollTimer);
    scrollTimer = setTimeout(() => {
      const center = containerEl.getBoundingClientRect().left + containerEl.offsetWidth / 2;
      let closest = null, closestDist = Infinity;
      getItems().forEach(el => {
        const r = el.getBoundingClientRect();
        const d = Math.abs(r.left + r.width / 2 - center);
        if (d < closestDist) { closestDist = d; closest = el; }
      });
      if (closest) {
        const val = Number(closest.dataset.value);
        if (val !== activeValue) { setActive(val); onSelect(val); }
      }
    }, 80);
  }, { passive: true });

  containerEl.addEventListener('wheel', e => {
    e.preventDefault();
    containerEl.scrollLeft += e.deltaY || e.deltaX;
  }, { passive: false });

  containerEl.addEventListener('keydown', e => {
    const vals = namedLevels.map(x => x.value);
    const idx = vals.indexOf(activeValue);
    if (e.key === 'ArrowRight' && idx < vals.length - 1) { e.preventDefault(); scrollToValue(vals[idx + 1]); }
    if (e.key === 'ArrowLeft'  && idx > 0)               { e.preventDefault(); scrollToValue(vals[idx - 1]); }
  });

  setTimeout(() => scrollToValue(activeValue, false), 0);
}

function pulseCard() {
  const card = document.getElementById('my-fighter-card');
  card.classList.remove('pulse');
  void card.offsetWidth;
  card.classList.add('pulse');
  setTimeout(() => card.classList.remove('pulse'), 500);
}

buildCarousel(
  document.getElementById('chess-carousel'),
  CHESS_NAMED, myChess,
  val => { myChess = val; updateMine(); draw(); pulseCard(); }
);
buildCarousel(
  document.getElementById('boxing-carousel'),
  BOXING_NAMED, myBox,
  val => { myBox = val; updateMine(); draw(); pulseCard(); }
);

// ── LEGEND BAR ──
(function () {
  const lc = document.getElementById('legendBar');
  const lctx = lc.getContext('2d');
  for (let x = 0; x < lc.width; x++) {
    lctx.fillStyle = color(x / (lc.width - 1));
    lctx.fillRect(x, 0, 1, lc.height);
  }
})();

updateMine();
draw();
</script>
